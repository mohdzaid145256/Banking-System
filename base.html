<!DOCTYPE html>
<html>
<head>
<title>Smart Banking</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background:#eef2f7; }
.navbar { box-shadow:0 2px 6px rgba(0,0,0,0.1); }
.card { border-radius:12px; box-shadow:0 4px 10px rgba(0,0,0,0.1); }
</style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
<span class="navbar-brand">🏦 Smart Banking</span>
<div>
<a href="/" class="btn btn-light btn-sm">Home</a>
<a href="/dashboard" class="btn btn-light btn-sm">Dashboard</a>
<button onclick="logout()" class="btn btn-danger btn-sm">Logout</button>
</div>
</nav>

<div class="container mt-4">
{% block content %}{% endblock %}
</div>

<script>
function logout(){
fetch('/logout',{method:'POST'})
.then(r=>r.json())
.then(data=>{
alert(data.message)
window.location.href = "/"
})
}
</script>

</body>
</html>
